name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Update Ansible inventory with EC2 IP
        run: |
          sed -i "s/EC2_PUBLIC_IP/${{ secrets.EC2_HOST }}/" infra/ansible/inventory.ini
          sed -i "s|your-key.pem|/root/.ssh/deploy_key|" infra/ansible/inventory.ini

      - name: Write Ansible vars
        run: |
          cat > infra/ansible/vars.yml <<EOF
          app_repo: ${{ secrets.APP_REPO_URL }}
          db_host: ${{ secrets.DB_HOST }}
          db_name: ${{ secrets.DB_NAME }}
          db_user: ${{ secrets.DB_USER }}
          db_password: ${{ secrets.DB_PASSWORD }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          EOF

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i infra/ansible/inventory.ini infra/ansible/playbook.yml

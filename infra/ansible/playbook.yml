---
- name: Deploy AI Performance Evaluation System
  hosts: app_server
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-pip
        state: present




#    - name: Remove conflicting Docker packages
#      apt:
#        name:
#          - docker.io
#          - docker-compose-plugin
#          - containerd
#          - runc
#        state: absent
#        purge: yes
#      ignore_errors: yes

#    - name: Remove old Docker data
#      file:
#        path: "{{ item }}"
#        state: absent
#      loop:
#        - /var/lib/docker
#        - /var/lib/containerd
#      ignore_errors: yes




    - name: Create Docker keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker and Docker Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present



    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: yes
        state: started

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Clone or update application repository
      git:
        repo: "{{ app_repo }}"
        dest: /home/ubuntu/ai-performance-evaluator
        version: main
        force: yes
      become_user: ubuntu

    - name: Write .env file
      copy:
        dest: /home/ubuntu/ai-performance-evaluator/.env
        owner: ubuntu
        mode: "0600"
        content: |
          DB_HOST={{ db_host }}
          DB_PORT=5432
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          OPENAI_API_KEY={{ openai_api_key }}
          AI_MODEL={{ ai_model }}
          AI_BASE_URL={{ ai_base_url }}

    - name: Build and start containers
      shell: docker compose up -d --build
      args:
        chdir: /home/ubuntu/ai-performance-evaluator

    - name: Wait for app container to be ready
      pause:
        seconds: 15

    - name: Run DB schema migration
      shell: |
        docker compose exec -T app python <<'EOF'
        from app.core.db import get_engine
        from sqlalchemy import text

        engine = get_engine()

        with open('db/schema.sql') as f:
            sql = f.read()

        with engine.connect() as conn:
            for stmt in sql.split(';'):
                stmt = stmt.strip()
                if stmt:
                    conn.execute(text(stmt))
            conn.commit()

        print("Schema applied")
        EOF
      args:
        chdir: /home/ubuntu/ai-performance-evaluator


    - name: Run seed script
      shell: docker compose exec -T app python db/seed.py
      args:
        chdir: /home/ubuntu/ai-performance-evaluator
